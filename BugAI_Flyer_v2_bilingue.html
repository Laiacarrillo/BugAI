<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugAI — Flyer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --p1: #7C3AED; --p2: #A855F7; --p3: #C084FC; --cyan: #22D3EE;
  --dark: #06020F; --white: #FAF5FF; --muted: #7C6A99;
  --card: rgba(124,58,237,0.07); --border: rgba(168,85,247,0.15);
}

body {
  background: #000;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Outfit', sans-serif;
  padding: 32px 16px;
  gap: 16px;
}

/* ── LANG TOGGLE (outside the flyer) ── */
.lang-switcher {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(168,85,247,0.2);
  border-radius: 100px;
  padding: 5px 6px;
}

.lang-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  transition: all 0.22s cubic-bezier(0.16,1,0.3,1);
  background: transparent;
  color: #4A3D61;
}

.lang-btn.active {
  background: linear-gradient(135deg, #7C3AED, #A855F7);
  color: white;
  box-shadow: 0 0 20px rgba(124,58,237,0.4);
}

.lang-btn:not(.active):hover {
  color: var(--p3);
  background: rgba(124,58,237,0.08);
}

.lang-flag { font-size: 14px; }

/* ── FLYER ── */
.flyer {
  width: 540px;
  background: var(--dark);
  border-radius: 28px;
  overflow: hidden;
  position: relative;
  border: 1px solid var(--border);
  box-shadow:
    0 0 80px rgba(124,58,237,0.15),
    0 0 160px rgba(124,58,237,0.06),
    inset 0 1px 0 rgba(168,85,247,0.2);
  animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink  { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.7); } }

/* lang switch content fade */
@keyframes contentFade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.lang-refresh { animation: contentFade 0.3s ease-out; }

.orb { position:absolute; border-radius:50%; pointer-events:none; filter:blur(60px); }
.orb-1 { width:320px;height:320px;background:radial-gradient(circle,rgba(124,58,237,0.3),transparent 70%);top:-100px;left:-80px; }
.orb-2 { width:260px;height:260px;background:radial-gradient(circle,rgba(34,211,238,0.12),transparent 70%);bottom:80px;right:-60px; }
.orb-3 { width:200px;height:200px;background:radial-gradient(circle,rgba(168,85,247,0.15),transparent 70%);top:45%;left:50%;transform:translateX(-50%); }

.grid {
  position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(168,85,247,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(168,85,247,0.05) 1px,transparent 1px);
  background-size:36px 36px;
}

.inner { position:relative;z-index:1;padding:44px 40px 40px; }

/* STATUS BAR */
.status-bar { display:flex;align-items:center;justify-content:space-between;margin-bottom:22px; }

.pill {
  display:inline-flex;align-items:center;gap:7px;padding:5px 14px 5px 8px;
  background:rgba(124,58,237,0.12);border:1px solid rgba(168,85,247,0.25);border-radius:100px;
  font-size:10.5px;font-weight:500;color:var(--p3);letter-spacing:0.08em;text-transform:uppercase;
}
.pill-dot { width:7px;height:7px;border-radius:50%;background:#22D3EE;animation:blink 1.8s ease-in-out infinite;flex-shrink:0; }
.flags { display:flex;gap:6px;font-size:18px; }

/* BRAND */
.brand { display:flex;align-items:baseline;margin-bottom:4px; }
.logo-bug {
  font-family:'Bricolage Grotesque',sans-serif;font-size:64px;font-weight:800;letter-spacing:-3px;line-height:1;
  background:linear-gradient(135deg,#A855F7 0%,#C084FC 40%,#22D3EE 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-ai { font-family:'Bricolage Grotesque',sans-serif;font-size:64px;font-weight:800;letter-spacing:-3px;line-height:1;color:var(--white);opacity:0.9; }

.tagline { font-size:13px;color:var(--muted);font-weight:400;letter-spacing:0.03em;margin-bottom:24px; }

.headline { font-family:'Bricolage Grotesque',sans-serif;font-size:34px;font-weight:700;color:var(--white);line-height:1.15;letter-spacing:-1px;margin-bottom:10px; }
.headline em { font-style:normal;background:linear-gradient(90deg,#A855F7,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
.sub { font-size:13.5px;color:#5B4D72;line-height:1.75; }

.sep { height:1px;background:linear-gradient(90deg,transparent,rgba(168,85,247,0.35),rgba(34,211,238,0.2),transparent);margin:26px 0; }

/* SERVICES */
.section-label { font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--p2);margin-bottom:12px; }
.services { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:26px; }
.svc { background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 15px;position:relative;overflow:hidden; }
.svc::before { content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,var(--p1),var(--cyan));opacity:0;transition:opacity 0.25s; }
.svc:hover::before { opacity:1; }
.svc-icon { font-size:20px;margin-bottom:7px;display:block; }
.svc-name { font-size:12.5px;font-weight:600;color:var(--white);margin-bottom:3px; }
.svc-desc { font-size:11px;color:#4A3D61;line-height:1.5; }

/* PRICING */
.pricing-wrap { background:rgba(255,255,255,0.02);border:1px solid rgba(168,85,247,0.12);border-radius:18px;overflow:hidden;margin-bottom:26px; }
.pricing-header { display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:rgba(124,58,237,0.1);border-bottom:1px solid rgba(168,85,247,0.12); }
.ph-left { font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--p2); }
.launch-badge { display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(34,211,238,0.15));border:1px solid rgba(34,211,238,0.3);color:var(--cyan);font-size:9.5px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:100px; }
.price-row { display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.2s; }
.price-row:last-child { border-bottom:none; }
.price-row:hover { background:rgba(124,58,237,0.05); }
.pr-left { display:flex;align-items:center;gap:11px; }
.pr-bar { width:3px;height:34px;border-radius:4px;flex-shrink:0; }
.bar-1 { background:linear-gradient(180deg,#7C3AED,#A855F7); }
.bar-2 { background:linear-gradient(180deg,#A855F7,#C084FC); }
.bar-3 { background:linear-gradient(180deg,#22D3EE,#7C3AED); }
.bar-4 { background:linear-gradient(180deg,#10B981,#22D3EE); }
.pr-name { font-size:13px;color:var(--white);font-weight:500; }
.pr-sub  { font-size:10.5px;color:#4A3D61;margin-top:2px; }
.pr-right { text-align:right; }
.pr-prices { display:flex;align-items:baseline;gap:8px;justify-content:flex-end; }
.pr-old { font-size:11px;color:#3A2F4D;text-decoration:line-through;text-decoration-color:rgba(124,58,237,0.4); }
.pr-new { font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700;color:var(--p3); }
.pr-usd { font-size:10px;color:var(--muted);margin-top:2px; }

/* DISCOUNT */
.discount-note { display:flex;align-items:center;gap:10px;background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.18);border-radius:12px;padding:11px 16px;margin-bottom:24px; }
.dn-icon { font-size:18px;flex-shrink:0; }
.dn-text { font-size:11.5px;color:#34D399;line-height:1.5; }
.dn-text strong { color:#6EE7B7;font-weight:600; }

/* CTA */
.cta { background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(34,211,238,0.06));border:1px solid rgba(168,85,247,0.2);border-radius:20px;padding:26px 24px;text-align:center;position:relative;overflow:hidden;margin-bottom:22px; }
.cta::before { content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:220px;height:220px;background:radial-gradient(circle,rgba(124,58,237,0.18),transparent 70%);pointer-events:none; }
.cta-eyebrow { display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--cyan);margin-bottom:8px; }
.cta-title { font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:700;color:var(--white);line-height:1.2;margin-bottom:6px;position:relative; }
.cta-sub { font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.7;position:relative; }
.btn-wa { display:inline-flex;align-items:center;gap:9px;background:linear-gradient(135deg,#25D366,#128C7E);color:white;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;padding:13px 28px;border-radius:100px;border:none;cursor:pointer;letter-spacing:0.01em;box-shadow:0 0 30px rgba(37,211,102,0.35),0 4px 16px rgba(0,0,0,0.4);text-decoration:none;transition:transform 0.2s,box-shadow 0.2s; }
.btn-wa:hover { transform:translateY(-2px);box-shadow:0 0 45px rgba(37,211,102,0.5),0 6px 20px rgba(0,0,0,0.4); }
.wa-icon { font-size:18px; }
.cta-step { display:flex;justify-content:center;gap:20px;margin-top:16px; }
.step { display:flex;flex-direction:column;align-items:center;gap:4px; }
.step-num { width:22px;height:22px;border-radius:50%;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.25);color:var(--p3);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center; }
.step-txt { font-size:10px;color:#4A3D61;text-align:center;max-width:90px; }
.step-arrow { font-size:12px;color:#2A1F3A;margin-top:9px;align-self:center; }

/* FOOTER */
.footer { display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.05);padding-top:18px; }
.f-logo { font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#A855F7,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
.f-tags { display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end; }
.f-tag { font-size:9.5px;color:#4A3D61;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);padding:3px 9px;border-radius:100px; }
</style>
</head>
<body>

<!-- ── LANGUAGE TOGGLE ── -->
<div class="lang-switcher">
  <button class="lang-btn active" id="btn-es" onclick="setLang('es')">
    <span class="lang-flag">🇪🇸</span> Español
  </button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">

  </button>
</div>

<!-- ── FLYER ── -->
<div class="flyer">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid"></div>

  <div class="inner">

    <!-- HEADER -->
    <div class="status-bar">
      <div class="pill">
        <span class="pill-dot"></span>

    <!-- SERVICES -->
    <div class="section-label">

    <div class="services">
      <div class="svc">

        <div class="svc-desc"><span data-es="Atención al cliente 24/7 en WhatsApp, Instagram y email" data-en="24/7 customer support on WhatsApp, Instagram and email"></span></div>

      <div class="svc">

        <div class="svc-name"><span data-es="CRM & Ventas" data-en="CRM & Sales"></span></div>
        <div class="svc-desc"><span data-es="Pipeline automatizado, leads nutridos sin intervención" data-en="Automated pipeline, leads nurtured hands-free"></span></div>
      </div>
      <div class="svc">

        <span class="svc-icon">📊</span>

        <div class="svc-desc"><span data-es="Dashboards actualizados en tiempo real sin trabajo manual" data-en="Real-time dashboards updated automatically, zero manual work"></span></div>

    <!-- PRICING -->

      <div class="price-row">

<script>
  let currentLang = 'es';

  // WhatsApp messages per language
  const waMessages = {
    es: 'Hola%2C+vi+tu+flyer+y+quiero+saber+m%C3%A1s+sobre+automatizaciones+para+mi+negocio',
    en: 'Hi%2C+I+saw+your+flyer+and+I%27d+like+to+know+more+about+automations+for+my+business'
  };

  function setLang(lang) {
    if (lang === currentLang) return;
    currentLang = lang;

    // Toggle button states
    document.getElementById('btn-es').classList.toggle('active', lang === 'es');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');

    // Update all translatable spans
    document.querySelectorAll('[data-es][data-en]').forEach(el => {
      el.innerHTML = el.getAttribute('data-' + lang);
    });

    // Update WhatsApp link message
    const waBtn = document.getElementById('wa-btn');
    const currentHref = waBtn.href;
    const base = currentHref.split('?text=')[0];
    waBtn.href = base + '?text=' + waMessages[lang];

    // Subtle content fade animation
    document.querySelector('.inner').classList.remove('lang-refresh');
    void document.querySelector('.inner').offsetWidth; // force reflow
    document.querySelector('.inner').classList.add('lang-refresh');

    // Update html lang attribute
    document.documentElement.lang = lang;
  }

  // Init on load — render Spanish content
  setLang('es');
  // Fix: set es as truly initial without triggering the early-return guard
  currentLang = 'none';
  setLang('es');
</script>
</body>
